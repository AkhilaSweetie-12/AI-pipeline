apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-backend
  namespace: default
  labels:
    app: ai-platform-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-platform-backend
  template:
    metadata:
      labels:
        app: ai-platform-backend
    spec:
      serviceAccountName: ai-application
      containers:
      - name: backend
        image: nginx:alpine  # Placeholder for now
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
