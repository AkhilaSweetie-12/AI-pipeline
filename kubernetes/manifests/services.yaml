apiVersion: v1
kind: Service
metadata:
  name: ai-platform-backend-service
  namespace: default
  labels:
    app: ai-platform-backend
spec:
  selector:
    app: ai-platform-backend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ai-platform-frontend-service
  namespace: default
  labels:
    app: ai-platform-frontend
spec:
  selector:
    app: ai-platform-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: LoadBalancer
  loadBalancerIP: null  # GCP will assign external IP

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP
