apiVersion: v2
name: ai-platform-monitoring
description: A Helm chart for AI Platform Monitoring Stack
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - monitoring
  - observability
  - prometheus
  - grafana
  - loki
  - alertmanager
home: https://github.com/AkhilaSweetie-12/AI-pipeline
sources:
  - https://github.com/AkhilaSweetie-12/AI-pipeline
maintainers:
  - name: AI Platform Team
    email: team@aiplatform.com
annotations:
  category: Monitoring
  licenses: MIT
dependencies:
  - name: prometheus
    version: "25.0.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.0.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
  - name: loki
    version: "6.0.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: promtail
    version: "6.0.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: promtail.enabled
