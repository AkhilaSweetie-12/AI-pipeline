name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write

    strategy:
      matrix:
        shard: [1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Install Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
        continue-on-error: true

      - name: Build frontend if no artifacts
        working-directory: ./frontend
        run: npm run build
        if: failure()

      - name: Start services
        run: |
          # Start backend
          cd backend
          npm run start:prod &
          BACKEND_PID=$!
          
          # Wait for backend to be ready
          sleep 30
          
          # Start frontend
          cd ../frontend
          npm run start &
          FRONTEND_PID=$!
          
          # Wait for frontend to be ready
          sleep 30
          
          # Save PIDs for cleanup
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          echo "FRONTEND_PID=$FRONTEND_PID" >> $GITHUB_ENV

      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3001/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'

      - name: Create test users
        run: |
          # Create test users via API
          curl -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"testuser@example.com","password":"${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}","name":"Test User"}' || true
          
          curl -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com","password":"${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}","name":"Admin User"}' || true

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test --shard=${{ matrix.shard }}/4
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
          PLAYWRIGHT_TEST_API_URL: http://localhost:3001
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-shard-${{ matrix.shard }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always() && matrix.shard == 1
        with:
          name: playwright-html-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = './frontend/playwright-report/results.json';
            
            let comment = '## 🎭 Playwright Test Results\n\n';
            
            if (fs.existsSync(path)) {
              const results = JSON.parse(fs.readFileSync(path, 'utf8'));
              comment += `✅ Passed: ${results.passed}\n`;
              comment += `❌ Failed: ${results.failed}\n`;
              comment += `⏭️ Skipped: ${results.skipped}\n`;
              comment += `⏱️ Duration: ${results.duration}ms\n\n`;
              
              if (results.failed > 0) {
                comment += '### ❌ Failed Tests\n\n';
                results.suites.forEach(suite => {
                  suite.specs.forEach(spec => {
                    spec.tests.forEach(test => {
                      if (!test.results[0].status.includes('passed')) {
                        comment += `- **${test.title}**\n`;
                        comment += `  - ${test.results[0].error?.message || 'Unknown error'}\n\n`;
                      }
                    });
                  });
                });
              }
            } else {
              comment += '❌ Test results not found\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Cleanup services
        if: always()
        run: |
          if [ ! -z "$BACKEND_PID" ]; then
            kill $BACKEND_PID || true
          fi
          if [ ! -z "$FRONTEND_PID" ]; then
            kill $FRONTEND_PID || true
          fi

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_SERVER_BASE_URL: https://lhci.example.com
          LHCI_BUILD_CONTEXT_CURRENT_REF: ${{ github.ref }}
          LHCI_BUILD_CONTEXT_GITHUB_REPO_NAME: ${{ github.repository }}
          LHCI_BUILD_CONTEXT_GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          LHCI_BUILD_CONTEXT_GITHUB_COMMIT_HASH: ${{ github.sha }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  # Cross-browser Tests
  cross-browser-tests:
    name: Cross-browser Tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read

    strategy:
      matrix:
        browser: [webkit, firefox]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Install Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run cross-browser tests
        working-directory: ./frontend
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
          PLAYWRIGHT_TEST_API_URL: http://localhost:3001

      - name: Upload cross-browser results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-${{ matrix.browser }}-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  # Visual Regression Tests
  visual-regression-tests:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.event_name == 'pull_request'
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Install Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Run visual tests
        working-directory: ./frontend
        run: npx playwright test --grep="visual"

      - name: Upload visual results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

      - name: Comment PR with visual diff
        uses: actions/github-script@v7
        if: failure() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = './frontend/test-results/visual-diffs';
            
            if (fs.existsSync(path)) {
              const diffs = fs.readdirSync(path);
              if (diffs.length > 0) {
                let comment = '## 🎨 Visual Regression Tests\n\n';
                comment += '❌ Visual differences detected:\n\n';
                
                diffs.forEach(diff => {
                  comment += `- ${diff}\n`;
                });
                
                comment += '\nPlease review the visual differences and approve if they are intentional.';
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            }
