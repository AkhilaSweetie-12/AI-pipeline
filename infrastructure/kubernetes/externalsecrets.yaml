apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-api-key
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: openai-api-key
    creationPolicy: Owner
  data:
  - secretKey: openai-api-key
    remoteRef:
      key: dev-openai-api-key

